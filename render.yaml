# Render Blueprint for Gadget2Go backend
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this file to your GitHub repo (root level).
#   2. On Render dashboard -> New + -> Blueprint -> select this repo.
#   3. Render reads this file and creates the service automatically.
#   4. Fill in MONGO_URL and CORS_ORIGINS in the dashboard (they are not committed here).

services:
  - type: web
    name: gadget2go-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MONGO_URL
        sync: false        # set manually in Render dashboard (MongoDB Atlas SRV string)
      - key: DB_NAME
        value: gadget2go
      - key: CORS_ORIGINS
        sync: false        # set manually after Vercel deploy (e.g. https://your-app.vercel.app)
